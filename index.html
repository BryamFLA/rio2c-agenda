.counter{font-size:11px;opacity:.5}

.page{display:flex;padding-bottom:40px;overflow-x:auto;min-height:calc(100vh - 96px)}
.time-axis{flex-shrink:0;width:52px;position:sticky;left:0;z-index:100;background:#f0f2f8}

.time-label.half{color:#d1d5db;font-size:9px}
.trilhas-wrap{display:flex;gap:16px;padding:0 16px;flex:1;align-items:flex-start}

.trilha-body{position:relative;flex:1}
.grid-line{position:absolute;left:0;right:0;pointer-events:none}
.grid-line.hour{border-top:1px solid #dde1ea}
.grid-line.half{border-top:1px dashed #eaedf3}

.ev-card{position:absolute;border-radius:7px;background:#fff;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:4px 20px 4px 22px;overflow:hidden;transition:opacity .25s,box-shadow .15s;cursor:pointer}

.ev-time{font-size:9px;color:#9ca3af;margin-bottom:1px;font-variant-numeric:tabular-nums}
.ev-title{font-size:11px;font-weight:600;line-height:1.35;color:#111827}

.ev-room{font-size:9px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.ev-remove{position:absolute;top:3px;right:3px;width:16px;height:16px;border:none;background:rgba(0,0,0,.06);border-radius:50%;cursor:pointer;font-size:9px;color:#6b7280;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .15s;font-family:monospace}

// ── State persistence ──────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('rio2c_hidden',    JSON.stringify([...hidden]));
    localStorage.setItem('rio2c_favorites', JSON.stringify([...favorites]));
    localStorage.setItem('rio2c_notes',     JSON.stringify(notes));
  } catch(e) {}
}

function loadState() {
  try {
    const h = localStorage.getItem('rio2c_hidden');
    if (h) hidden = new Set(JSON.parse(h));
    const f = localStorage.getItem('rio2c_favorites');
    if (f) favorites = new Set(JSON.parse(f));
    const n = localStorage.getItem('rio2c_notes');
    if (n) notes = JSON.parse(n);
  } catch(e) {}
}

// ── Helpers ────────────────────────────────────────────────────
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getType(title) {
  if (/S\.O\.S\. Habilidades/i.test(title))      return 'Workshop';
  if (/masterclass/i.test(title))                 return 'Masterclass';
  if (/^mentoria/i.test(title))                   return 'Mentoria';
  if (/art talks for lunch/i.test(title))         return 'Art Talk';
  if (/laboratório dos sentidos/i.test(title))    return 'Lab';
  if (/Prêmio|Premio/i.test(title))               return 'Premiação';
  if (/sessão patrocinada|\*sessão/i.test(title)) return 'Patrocinada';
  if (/meetup/i.test(title))                      return 'Meetup';
  if (/pitching/i.test(title))                    return 'Pitching';
  if (/abertura/i.test(title))                    return 'Abertura';
  if (/conversas no aquário/i.test(title))        return 'Mesa Redonda';
  return 'Palestra';
}

function assignLanes(evs) {
  const sorted = [...evs].sort((a,b) => a.startMin - b.startMin);
  const lanes = [];
  const map = {};
  sorted.forEach(e => {
    let placed = false;
    for (let i = 0; i < lanes.length; i++) {
      if (e.startMin >= lanes[i].endMin) {
        map[e.idx] = i;
        lanes[i] = {endMin: e.endMin};
        placed = true; break;
      }
    }
    if (!placed) { map[e.idx] = lanes.length; lanes.push({endMin: e.endMin}); }
  });
  return {map, n: lanes.length};
}

// ── UI updates ─────────────────────────────────────────────────
function updateCounter() {
  const vis = EV.filter(e => e[1] === currentDay && !hidden.has(e[0])).length;
  document.getElementById('counter').textContent = vis + ' evento' + (vis !== 1 ? 's' : '');
}

function updateRestoreBtn() {
  const btn = document.getElementById('btn-restore');
  if (btn) btn.style.display = hidden.size > 0 ? '' : 'none';
}

function updateCardVisual(idx) {
  const card = document.getElementById('ev-' + idx);
  if (!card) return;
  card.classList.toggle('faved', favorites.has(idx));
  const favBtn = card.querySelector('.ev-fav');
  if (favBtn) favBtn.classList.toggle('on', favorites.has(idx));
  const timeEl = card.querySelector('.ev-time');
  if (timeEl) {
    const hasNote = !!(notes[idx] && notes[idx].trim());
    let icon = timeEl.querySelector('.ev-note-icon');
    if (hasNote && !icon) {
      icon = document.createElement('span');
      icon.className = 'ev-note-icon';
      icon.textContent = '✎';
      timeEl.appendChild(icon);
    } else if (!hasNote && icon) {
      icon.remove();
    }
  }
}

// ── Actions ────────────────────────────────────────────────────
function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.day === d));
  render();
}

function removeEvent(idx) {
  hidden.add(idx);
  saveState();
  const el = document.getElementById('ev-' + idx);
  if (el) { el.classList.add('removed'); setTimeout(() => el.remove(), 260); }
  updateCounter();
  updateRestoreBtn();
}

function toggleFavorite(idx) {
  if (favorites.has(idx)) favorites.delete(idx);
  else favorites.add(idx);
  saveState();
  updateCardVisual(idx);
}

function restoreAll() {
  hidden.clear();
  saveState();
  updateRestoreBtn();
  render();
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(idx) {
  const ev = EV.find(e => e[0] === idx);
  if (!ev || hidden.has(idx)) return;
  modalEvIdx = idx;
  const [,, start, end, title, room, trilha] = ev;
  const cfg = TRILHAS[trilha];
  const type = getType(title);

  const badge = document.getElementById('m-badge');
  badge.textContent = cfg.label;
  badge.style.cssText = `background:${cfg.color}18;color:${cfg.color};border:1px solid ${cfg.color}33`;

  document.getElementById('m-title').textContent =
    title.replace(/\*[^*]*/g, '').replace(/\s+/g, ' ').trim();

  document.getElementById('m-meta').innerHTML =
    `<span>🕐 ${esc(start)} – ${esc(end)}</span>` +
    `<span>📍 ${esc(room)}</span>` +
    `<span>${type}</span>`;

  const favBtn = document.getElementById('m-fav');
  favBtn.textContent = favorites.has(idx) ? '★ Favoritado' : '☆ Favoritar';
  favBtn.classList.toggle('on', favorites.has(idx));

  document.getElementById('m-notes').value = notes[idx] || '';

  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  modalEvIdx = null;
}

function modalToggleFav() {
  if (modalEvIdx === null) return;
  toggleFavorite(modalEvIdx);
  const favBtn = document.getElementById('m-fav');
  favBtn.textContent = favorites.has(modalEvIdx) ? '★ Favoritado' : '☆ Favoritar';
  favBtn.classList.toggle('on', favorites.has(modalEvIdx));
}

function modalRemove() {
  if (modalEvIdx === null) return;
  removeEvent(modalEvIdx);
  closeModal();
}

document.getElementById('m-notes').addEventListener('input', () => {
  if (modalEvIdx === null) return;
  const text = document.getElementById('m-notes').value;
  if (text.trim()) notes[modalEvIdx] = text;
  else delete notes[modalEvIdx];
  saveState();
  updateCardVisual(modalEvIdx);
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Render ─────────────────────────────────────────────────────
function render() {
  const totalH = (DAY_E - DAY_S) * PX;

  const axis = document.getElementById('time-axis');
  axis.style.height = (totalH + HDR_H + 8) + 'px';
  axis.innerHTML = '';
  for (let h = 10; h <= 19; h++) {
    const top = HDR_H + (h*60 - DAY_S) * PX;
    const lbl = Object.assign(document.createElement('div'), {className:'time-label', textContent:h+':00'});
    lbl.style.top = top + 'px';
    axis.appendChild(lbl);
    if (h < 19) {
      const lbl2 = Object.assign(document.createElement('div'), {className:'time-label half', textContent:h+':30'});
      lbl2.style.top = (top + 30*PX) + 'px';
      axis.appendChild(lbl2);
    }
  }

  const dayEvs = EV.filter(e => e[1] === currentDay && !hidden.has(e[0])).map(e => ({
    idx: e[0], start: e[2], end: e[3], title: e[4], room: e[5], trilha: e[6],
    startMin: toMin(e[2]), endMin: toMin(e[3]), type: getType(e[4])
  }));

  const dayTrilhas = ORDER.filter(t => dayEvs.some(e => e.trilha === t));
  const wrap = document.getElementById('trilhas');
  wrap.innerHTML = '';

  if (dayEvs.length === 0) {
    wrap.innerHTML = '<div class="empty-day">Nenhum evento para exibir.<br><button class="empty-day-btn" onclick="restoreAll()">↺ Restaurar todos</button></div>';
    updateCounter();
    return;
  }

  dayTrilhas.forEach(key => {
    const cfg = TRILHAS[key];
    const col = document.createElement('div');
    col.className = 'trilha-col';

    const hdr = document.createElement('div');
    hdr.className = 'trilha-hdr';
    hdr.style.cssText = `background:${cfg.color}15;color:${cfg.color};border-bottom-color:${cfg.color};top:${STICKY_TOP}px;`;
    hdr.textContent = cfg.label;
    col.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'trilha-body';
    body.style.height = totalH + 'px';

    for (let h = 10; h <= 19; h++) {
      const top = (h*60 - DAY_S) * PX;
      const g = document.createElement('div');
      g.className = 'grid-line hour'; g.style.top = top + 'px';
      body.appendChild(g);
      if (h < 19) {
        const g2 = document.createElement('div');
        g2.className = 'grid-line half'; g2.style.top = (top + 30*PX) + 'px';
        body.appendChild(g2);
      }
    }

    const colEvs = dayEvs.filter(e => e.trilha === key);
    const {map: laneMap, n: numLanes} = assignLanes(colEvs);

    colEvs.forEach(e => {
      const top = (e.startMin - DAY_S) * PX;
      const h = Math.max((e.endMin - e.startMin) * PX - 2, 18);
      const lane = laneMap[e.idx] || 0;
      const lw = 100 / numLanes;
      const isFaved = favorites.has(e.idx);
      const hasNote = !!(notes[e.idx] && notes[e.idx].trim());

      const card = document.createElement('div');
      card.id = 'ev-' + e.idx;
      card.className = 'ev-card' + (isFaved ? ' faved' : '');
      card.style.cssText =
        `top:${top}px;height:${h}px;border-left-color:${cfg.color};` +
        `left:calc(${lane*lw}% + 1px);width:calc(${lw}% - 2px);`;
      card.onclick = () => openModal(e.idx);

      const showMeta = h > 36;
      const showRoom = h > 56;
      const cleanTitle = esc(e.title.replace(/\*[^*]*/g,'').replace(/\s+/g,' ').trim());

      card.innerHTML =
        `<button class="ev-fav${isFaved ? ' on' : ''}" onclick="event.stopPropagation();toggleFavorite(${e.idx})" title="Favoritar">★</button>` +
        `<button class="ev-remove" onclick="event.stopPropagation();removeEvent(${e.idx})" title="Remover">✕</button>` +
        `<div class="ev-time">${e.start}–${e.end}${hasNote ? ' <span class="ev-note-icon">✎</span>' : ''}</div>` +
        `<div class="ev-title">${cleanTitle}</div>` +
        (showMeta
          ? `<div class="ev-meta">` +
            `<span class="ev-type">${e.type}</span>` +
            (showRoom ? `<span class="ev-room">📍 ${esc(e.room)}</span>` : '') +
            `</div>`
          : '');

      body.appendChild(card);
    });

    col.appendChild(body);
    wrap.appendChild(col);
  });

  const leg = document.getElementById('legend');
  leg.innerHTML = dayTrilhas.map(t => {
    const c = TRILHAS[t];
    return `<div class="leg-item"><div class="leg-dot" style="background:${c.color}"></div><span>${c.label}</span></div>`;
  }).join('');

  updateCounter();
  updateRestoreBtn();
}

loadState();
render();
</script>
