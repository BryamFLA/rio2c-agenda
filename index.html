*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f8;color:#1a1a2e;overscroll-behavior:none}
header{background:#1a1a2e;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.4)}

.logo{font-weight:700;font-size:15px;white-space:nowrap;letter-spacing:.5px}
.tabs{display:flex;gap:6px}
.tab{padding:6px 14px;border:none;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);transition:all .2s}
.tab.active{background:#fff;color:#1a1a2e}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;opacity:.85}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.counter{font-size:11px;opacity:.5}
.btn-restore{padding:4px 10px;border:1px solid rgba(255,255,255,.25);border-radius:12px;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:rgba(255,255,255,.65);transition:all .2s}
.btn-restore:hover{background:rgba(255,255,255,.15);color:#fff}

.page{display:flex;padding-bottom:40px;overflow-x:auto;min-height:calc(100vh - 96px)}
.time-axis{flex-shrink:0;width:52px;position:sticky;left:0;z-index:100;background:#f0f2f8}
.time-label{position:absolute;right:8px;font-size:10px;color:#9ca3af;white-space:nowrap;transform:translateY(-50%);font-variant-numeric:tabular-nums}
.time-label.half{color:#d1d5db;font-size:9px}
.trilhas-wrap{display:flex;gap:16px;padding:0 16px;flex:1;align-items:flex-start}

.trilha-col{flex:none;position:relative;display:flex;flex-direction:column;border-radius:8px;transition:background .15s,outline .15s}
.trilha-col.drop-active{outline:2px dashed rgba(99,102,241,.5);outline-offset:-2px;background:rgba(99,102,241,.04)}
.trilha-hdr{text-align:center;font-size:10px;font-weight:800;padding:0 6px;border-radius:6px 6px 0 0;height:36px;display:flex;align-items:center;justify-content:center;letter-spacing:.6px;text-transform:uppercase;position:sticky;top:96px;z-index:90;border-bottom:2px solid}
.trilha-body{position:relative;flex:1}
.grid-line{position:absolute;left:0;right:0;pointer-events:none}
.grid-line.hour{border-top:1px solid #dde1ea}
.grid-line.half{border-top:1px dashed #eaedf3}
.col-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:#d1d5db;text-align:center;line-height:1.6;width:130px;pointer-events:none;user-select:none}

.ev-card{position:absolute;border-radius:7px;background:#fff;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:4px 20px 4px 28px;overflow:hidden;transition:opacity .25s,box-shadow .15s;touch-action:none;user-select:none}
.ev-card:active{box-shadow:0 2px 10px rgba(0,0,0,.14)}
.ev-card.faved{background:#fffbeb}
.ev-card.removed{opacity:0;pointer-events:none;transform:scale(.95)}
.ev-card.dragging{opacity:.25}
.ev-time{font-size:9px;color:#9ca3af;margin-bottom:1px;font-variant-numeric:tabular-nums}
.ev-title{font-size:11px;font-weight:600;line-height:1.35;color:#111827}
.ev-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;align-items:center}
.ev-type{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;background:rgba(0,0,0,.06);color:#374151}
.ev-room{font-size:9px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.ev-remove{position:absolute;top:3px;right:3px;width:16px;height:16px;border:none;background:rgba(0,0,0,.06);border-radius:50%;cursor:pointer;font-size:9px;color:#6b7280;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .15s;font-family:monospace}
.ev-remove:hover{background:rgba(220,38,38,.18);color:#dc2626;transform:scale(1.15)}
.ev-fav{position:absolute;top:2px;left:2px;width:22px;height:22px;border:none;background:rgba(0,0,0,.05);border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .15s;color:#9ca3af}
.ev-fav:hover{color:#f59e0b;transform:scale(1.1)}
.ev-fav.on{color:#f59e0b;background:rgba(245,158,11,.14)}
.ev-note-badge{position:absolute;bottom:4px;right:4px;width:10px;height:12px;background:#6366f1;border-radius:1px;opacity:.75;pointer-events:none}
.ev-note-badge::before{content:'';position:absolute;top:0;right:0;width:4px;height:4px;background:#f0f2f8;border-radius:0 0 0 2px}
.ev-note-badge::after{content:'';position:absolute;left:2px;top:5px;width:6px;height:1.5px;background:rgba(255,255,255,.85);box-shadow:0 2.5px 0 rgba(255,255,255,.85)}

.modal-close{margin-left:auto;width:26px;height:26px;border:none;background:#f3f4f6;border-radius:50%;cursor:pointer;font-size:12px;color:#6b7280;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}

.modal-routes{display:flex;gap:5px;margin-bottom:12px}

// ── Persistence ────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('rio2c_hidden',    JSON.stringify([...hidden]));
    localStorage.setItem('rio2c_favorites', JSON.stringify([...favorites]));
    localStorage.setItem('rio2c_notes',     JSON.stringify(notes));
    localStorage.setItem('rio2c_routes',    JSON.stringify({
      1: [...routes[1]], 2: [...routes[2]], 3: [...routes[3]]
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const h = localStorage.getItem('rio2c_hidden');
    if (h) hidden = new Set(JSON.parse(h));
    const f = localStorage.getItem('rio2c_favorites');
    if (f) favorites = new Set(JSON.parse(f));
    const n = localStorage.getItem('rio2c_notes');
    if (n) notes = JSON.parse(n);
    const r = localStorage.getItem('rio2c_routes');
    if (r) {
      const p = JSON.parse(r);
      routes = { 1: new Set(p[1]||[]), 2: new Set(p[2]||[]), 3: new Set(p[3]||[]) };
    }
  } catch(e) {}
}

// ── Helpers ────────────────────────────────────────────────────
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getType(title) {
  if (/S\.O\.S\. Habilidades/i.test(title))      return 'Workshop';
  if (/masterclass/i.test(title))                 return 'Masterclass';
  if (/^mentoria/i.test(title))                   return 'Mentoria';
  if (/art talks for lunch/i.test(title))         return 'Art Talk';
  if (/laboratório dos sentidos/i.test(title))    return 'Lab';
  if (/Prêmio|Premio/i.test(title))               return 'Premiação';
  if (/sessão patrocinada|\*sessão/i.test(title)) return 'Patrocinada';
  if (/meetup/i.test(title))                      return 'Meetup';
  if (/pitching/i.test(title))                    return 'Pitching';
  if (/abertura/i.test(title))                    return 'Abertura';
  if (/conversas no aquário/i.test(title))        return 'Mesa Redonda';
  return 'Palestra';
}

function assignLanes(evs) {
  const sorted = [...evs].sort((a,b) => a.startMin - b.startMin);
  const lanes = [], map = {};
  sorted.forEach(e => {
    let placed = false;
    for (let i = 0; i < lanes.length; i++) {
      if (e.startMin >= lanes[i].endMin) {
        map[e.idx] = i; lanes[i] = {endMin: e.endMin}; placed = true; break;
      }
    }
    if (!placed) { map[e.idx] = lanes.length; lanes.push({endMin: e.endMin}); }
  });
  return {map, n: lanes.length};
}

function getEvRoute(idx) {
  if (routes[1].has(idx)) return 1;
  if (routes[2].has(idx)) return 2;
  if (routes[3].has(idx)) return 3;
  return 0;
}

function assignRoute(idx, routeKey) {
  routes[1].delete(idx); routes[2].delete(idx); routes[3].delete(idx);
  if (routeKey > 0) routes[routeKey].add(idx);
  saveState();
}

// ── Drag and drop (Pointer Events) ────────────────────────────
function initCardPointerEvents(card, idx) {
  let holdTimer = null;
  let startX = 0, startY = 0;
  let pid = null; // pointerId para capture

  card.addEventListener('pointerdown', e => {
    if (e.target.closest('.ev-remove') || e.target.closest('.ev-fav')) return;
    // preventDefault: impede menu de contexto do iOS/Android no long-press
    // e impede que o browser inicie scroll antes do timer de hold
    e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    pid = e.pointerId;
    holdTimer = setTimeout(() => {
      holdTimer = null;
      // setPointerCapture: garante que TODOS os eventos pointer (move/up)
      // continuem chegando no card mesmo se o dedo sair da área
      try { card.setPointerCapture(pid); } catch (_) {}
      startDrag(idx, card, startX, startY);
    }, DRAG_DELAY);
  });

  card.addEventListener('pointermove', e => {
    if (!holdTimer) return;
    // Impede scroll do browser durante o período de hold
    e.preventDefault();
    if (Math.hypot(e.clientX - startX, e.clientY - startY) > DRAG_THRESH) {
      clearTimeout(holdTimer); holdTimer = null;
    }
  }, { passive: false });

  card.addEventListener('pointerup', e => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; openModal(idx); }
  });

  card.addEventListener('pointercancel', () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  });
}

function startDrag(idx, srcCard, startX, startY) {
  const rect = srcCard.getBoundingClientRect();
  const trilhaCfg = TRILHAS[EV.find(e => e[0] === idx)?.[6]] || { color: '#6b7280' };

  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  dragGhost.innerHTML = srcCard.innerHTML;
  dragGhost.style.cssText =
    `width:${CARD_W}px;height:${rect.height}px;` +
    `left:${rect.left}px;top:${rect.top}px;` +
    `border-left-color:${trilhaCfg.color};` +
    `background:${srcCard.classList.contains('faved') ? '#fffbeb' : '#fff'};`;
  document.body.appendChild(dragGhost);

  srcCard.classList.add('dragging');
  dragState = {
    idx,
    srcCard,
    originRoute: getEvRoute(idx),
    offX: startX - rect.left,
    offY: startY - rect.top
  };

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup',   onDragEnd);
  document.addEventListener('pointercancel', onDragCancel);
}

function onDragMove(e) {
  if (!dragGhost || !dragState) return;
  e.preventDefault();
  dragGhost.style.left = (e.clientX - dragState.offX) + 'px';
  dragGhost.style.top  = (e.clientY - dragState.offY) + 'px';

  document.querySelectorAll('.trilha-col').forEach(col => {
    const r = col.getBoundingClientRect();
    const over = e.clientX >= r.left && e.clientX <= r.right &&
                 e.clientY >= r.top  && e.clientY <= r.bottom;
    col.classList.toggle('drop-active', over);
  });
}

function onDragEnd(e) {
  if (!dragState) { dragCleanup(); return; }

  let targetRoute = null;
  document.querySelectorAll('.trilha-col').forEach(col => {
    const r = col.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right &&
        e.clientY >= r.top  && e.clientY <= r.bottom) {
      targetRoute = parseInt(col.dataset.route);
    }
  });

  dragCleanup();

  if (targetRoute !== null && targetRoute !== dragState.originRoute) {
    assignRoute(dragState.idx, targetRoute);
    dragState = null;
    render();
  } else {
    dragState.srcCard.classList.remove('dragging');
    dragState = null;
  }
}

function onDragCancel() {
  if (dragState) { dragState.srcCard.classList.remove('dragging'); dragState = null; }
  dragCleanup();
}

function dragCleanup() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);
  document.querySelectorAll('.trilha-col').forEach(c => c.classList.remove('drop-active'));
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
}

// ── UI helpers ─────────────────────────────────────────────────
function updateCounter() {
  const total = EV.filter(e => e[1] === currentDay && !hidden.has(e[0])).length;
  const inRoutes = [...routes[1], ...routes[2], ...routes[3]]
    .filter(idx => EV.find(e => e[0] === idx && e[1] === currentDay)).length;
  const avail = total - inRoutes;
  document.getElementById('counter').textContent =
    inRoutes > 0 ? `${inRoutes} em rotas · ${avail} livres` : `${total} eventos`;
}

function updateRestoreBtn() {
  const btn = document.getElementById('btn-restore');
  if (btn) btn.style.display = hidden.size > 0 ? '' : 'none';
}

function updateCardVisual(idx) {
  const card = document.getElementById('ev-' + idx);
  if (!card) return;
  card.classList.toggle('faved', favorites.has(idx));
  const favBtn = card.querySelector('.ev-fav');
  if (favBtn) favBtn.classList.toggle('on', favorites.has(idx));
  let badge = card.querySelector('.ev-note-badge');
  const hasNote = !!(notes[idx] && notes[idx].trim());
  if (hasNote && !badge) {
    badge = document.createElement('div'); badge.className = 'ev-note-badge';
    card.appendChild(badge);
  } else if (!hasNote && badge) { badge.remove(); }
}

// ── Actions ────────────────────────────────────────────────────
function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.day === d));
  render();
}

function removeEvent(idx) {
  hidden.add(idx);
  routes[1].delete(idx); routes[2].delete(idx); routes[3].delete(idx);
  saveState();
  const el = document.getElementById('ev-' + idx);
  if (el) { el.classList.add('removed'); setTimeout(() => el.remove(), 260); }
  updateCounter(); updateRestoreBtn();
}

function toggleFavorite(idx) {
  if (favorites.has(idx)) favorites.delete(idx); else favorites.add(idx);
  saveState(); updateCardVisual(idx);
}

function restoreAll() {
  hidden.clear(); saveState(); updateRestoreBtn(); render();
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(idx) {
  const ev = EV.find(e => e[0] === idx);
  if (!ev || hidden.has(idx)) return;
  modalEvIdx = idx;
  const [,, start, end, title, room, trilha] = ev;
  const cfg = TRILHAS[trilha];

  const badge = document.getElementById('m-badge');
  badge.textContent = cfg.label;
  badge.style.cssText = `background:${cfg.color}18;color:${cfg.color};border:1px solid ${cfg.color}33`;

  document.getElementById('m-title').textContent =
    title.replace(/\*[^*]*/g,'').replace(/\s+/g,' ').trim();

  document.getElementById('m-meta').innerHTML =
    `<span>🕐 ${esc(start)} – ${esc(end)}</span><span>📍 ${esc(room)}</span><span>${getType(title)}</span>`;

  const favBtn = document.getElementById('m-fav');
  favBtn.textContent = favorites.has(idx) ? '★ Favoritado' : '☆ Favoritar';
  favBtn.classList.toggle('on', favorites.has(idx));

  updateModalRoutes(idx);
  document.getElementById('m-notes').value = notes[idx] || '';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function updateModalRoutes(idx) {
  const cur = getEvRoute(idx ?? modalEvIdx);
  document.getElementById('m-routes').innerHTML =
    [0,1,2,3].map(k =>
      `<button class="route-btn${cur===k?' active':''}"
        style="${cur===k ? `background:${ROUTE_COLORS[k]};border-color:${ROUTE_COLORS[k]};` : ''}"
        onclick="modalSetRoute(${k})">${ROUTE_LABELS[k]}</button>`
    ).join('');
}

function modalSetRoute(routeKey) {
  if (modalEvIdx === null) return;
  assignRoute(modalEvIdx, routeKey);
  updateModalRoutes(modalEvIdx);
  render();
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  modalEvIdx = null;
}

function modalToggleFav() {
  if (modalEvIdx === null) return;
  toggleFavorite(modalEvIdx);
  const btn = document.getElementById('m-fav');
  btn.textContent = favorites.has(modalEvIdx) ? '★ Favoritado' : '☆ Favoritar';
  btn.classList.toggle('on', favorites.has(modalEvIdx));
}

function modalRemove() {
  if (modalEvIdx === null) return;
  removeEvent(modalEvIdx); closeModal();
}

document.getElementById('m-notes').addEventListener('input', () => {
  if (modalEvIdx === null) return;
  const text = document.getElementById('m-notes').value;
  if (text.trim()) notes[modalEvIdx] = text; else delete notes[modalEvIdx];
  saveState(); updateCardVisual(modalEvIdx);
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Now indicator ─────────────────────────────────────────────
function getNowSP() {
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Sao_Paulo',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(new Date());
  const get = t => parseInt(parts.find(p => p.type === t).value);
  const hour = get('hour'), minute = get('minute');
  return { year:get('year'), month:get('month'), day:get('day'),
           hour, minute, totalMin: hour*60 + minute };
}

function addNowIndicators() {
  const sp = getNowSP();
  const fmt2 = n => String(n).padStart(2,'0');
  const isEventDay = sp.year===2026 && sp.month===5 && [26,27,28].includes(sp.day);
  const withinHours = sp.totalMin >= DAY_S && sp.totalMin <= DAY_E;

  // Live badge (header) — show whenever it's an event day within hours
  const liveBadge = document.getElementById('live-badge');
  const liveTime  = document.getElementById('live-time');
  if (liveBadge && liveTime) {
    liveBadge.style.display = (isEventDay && withinHours) ? '' : 'none';
    if (isEventDay && withinHours)
      liveTime.textContent = fmt2(sp.hour)+':'+fmt2(sp.minute)+' SP';
  }

  // Draw band + line only on the viewed event day, within hours
  if (!isEventDay || sp.day !== currentDay || !withinHours) return;

  const nowTop  = (sp.totalMin - DAY_S) * PX;
  const slotMin = Math.floor(sp.totalMin / 30) * 30;
  const slotTop = Math.max((slotMin - DAY_S) * PX, 0);
  const bandH   = Math.min(30 * PX, (DAY_E - slotMin) * PX);

  document.querySelectorAll('.trilha-body').forEach(body => {
    const band = document.createElement('div');
    band.className = 'now-band';
    band.style.top = slotTop + 'px';
    band.style.height = bandH + 'px';
    body.appendChild(band);

    const line = document.createElement('div');
    line.className = 'now-line';
    line.style.top = nowTop + 'px';
    body.appendChild(line);
  });

  // Current-time tick on the axis
  const axis = document.getElementById('time-axis');
  const tick = document.createElement('div');
  tick.className = 'now-tick';
  tick.textContent = fmt2(sp.hour)+':'+fmt2(sp.minute);
  tick.style.top = (HDR_H + nowTop) + 'px';
  axis.appendChild(tick);
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const totalH = (DAY_E - DAY_S) * PX;

  // Time axis
  const axis = document.getElementById('time-axis');
  axis.style.height = (totalH + HDR_H + 8) + 'px';
  axis.innerHTML = '';
  for (let h = 10; h <= 19; h++) {
    const top = HDR_H + (h*60 - DAY_S) * PX;
    const l = Object.assign(document.createElement('div'),
      {className:'time-label', textContent:h+':00'});
    l.style.top = top + 'px'; axis.appendChild(l);
    if (h < 19) {
      const l2 = Object.assign(document.createElement('div'),
        {className:'time-label half', textContent:h+':30'});
      l2.style.top = (top + 30*PX) + 'px'; axis.appendChild(l2);
    }
  }

  // All visible events for this day
  const dayEvs = EV.filter(e => e[1] === currentDay && !hidden.has(e[0])).map(e => ({
    idx: e[0], start: e[2], end: e[3], title: e[4], room: e[5], trilha: e[6],
    startMin: toMin(e[2]), endMin: toMin(e[3]), type: getType(e[4])
  }));

  const wrap = document.getElementById('trilhas');
  wrap.innerHTML = '';

  if (dayEvs.length === 0) {
    wrap.innerHTML = '<div class="empty-day">Nenhum evento para exibir.<br><button class="empty-day-btn" onclick="restoreAll()">↺ Restaurar todos</button></div>';
    updateCounter(); return;
  }

  ROUTE_COLS.forEach(routeCol => {
    // Events for this column
    const colEvs = routeCol.key === 0
      ? dayEvs.filter(e => !routes[1].has(e.idx) && !routes[2].has(e.idx) && !routes[3].has(e.idx))
      : dayEvs.filter(e => routes[routeCol.key].has(e.idx));

    const {map: laneMap, n: numLanes} = assignLanes(colEvs);
    const colWidth = Math.max(numLanes, 1) * CARD_W;

    const col = document.createElement('div');
    col.className = 'trilha-col';
    col.dataset.route = routeCol.key;
    col.style.width = colWidth + 'px';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'trilha-hdr';
    hdr.style.cssText =
      `background:${routeCol.color}18;color:${routeCol.color};` +
      `border-bottom-color:${routeCol.color};top:${STICKY_TOP}px;`;
    const count = colEvs.length;
    hdr.textContent = count > 0 ? `${routeCol.label} (${count})` : routeCol.label;
    col.appendChild(hdr);

    // Body
    const body = document.createElement('div');
    body.className = 'trilha-body';
    body.style.height = totalH + 'px';

    // Grid lines
    for (let h = 10; h <= 19; h++) {
      const top = (h*60 - DAY_S) * PX;
      const g = document.createElement('div');
      g.className = 'grid-line hour'; g.style.top = top + 'px'; body.appendChild(g);
      if (h < 19) {
        const g2 = document.createElement('div');
        g2.className = 'grid-line half'; g2.style.top = (top+30*PX)+'px'; body.appendChild(g2);
      }
    }

    // Empty placeholder
    if (colEvs.length === 0) {
      const ph = document.createElement('div');
      ph.className = 'col-empty';
      ph.innerHTML = routeCol.key === 0
        ? 'Todos os eventos<br>distribuídos ✓'
        : 'Segure e arraste<br>eventos para cá';
      body.appendChild(ph);
    }

    // Cards
    colEvs.forEach(e => {
      const trilhaCfg = TRILHAS[e.trilha];
      const top = (e.startMin - DAY_S) * PX;
      const h = Math.max((e.endMin - e.startMin) * PX - 2, 18);
      const lane = laneMap[e.idx] || 0;
      const isFaved = favorites.has(e.idx);
      const hasNote = !!(notes[e.idx] && notes[e.idx].trim());

      const card = document.createElement('div');
      card.id = 'ev-' + e.idx;
      card.className = 'ev-card' + (isFaved ? ' faved' : '');
      card.style.cssText =
        `top:${top}px;height:${h}px;border-left-color:${trilhaCfg.color};` +
        `left:${lane * CARD_W + 1}px;width:${CARD_W - 3}px;`;

      initCardPointerEvents(card, e.idx);

      const showMeta = h > 36;
      const showRoom = h > 56;
      const cleanTitle = esc(e.title.replace(/\*[^*]*/g,'').replace(/\s+/g,' ').trim());

      card.innerHTML =
        `<button class="ev-fav${isFaved?' on':''}" onclick="event.stopPropagation();toggleFavorite(${e.idx})" title="Favoritar">★</button>` +
        `<button class="ev-remove" onclick="event.stopPropagation();removeEvent(${e.idx})" title="Remover">✕</button>` +
        (hasNote ? `<div class="ev-note-badge"></div>` : '') +
        `<div class="ev-time">${e.start}–${e.end}</div>` +
        `<div class="ev-title">${cleanTitle}</div>` +
        (showMeta
          ? `<div class="ev-meta"><span class="ev-type">${e.type}</span>` +
            (showRoom ? `<span class="ev-room">📍 ${esc(e.room)}</span>` : '') +
            `</div>`
          : '');

      body.appendChild(card);
    });

    col.appendChild(body);
    wrap.appendChild(col);
  });

  // Legend (trilha colors — helps identify card type)
  const leg = document.getElementById('legend');
  leg.innerHTML = Object.entries(TRILHAS).map(([,c]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${c.color}"></div><span>${c.label}</span></div>`
  ).join('');

  updateCounter();
  updateRestoreBtn();
  addNowIndicators();
}

loadState();
render();

// Auto-refresh now indicator every 60 s on event days
(function() {
  const sp = getNowSP();
  if (sp.year===2026 && sp.month===5 && [26,27,28].includes(sp.day))
    setInterval(() => render(), 60_000);
})();
</script>
</body>
</html>
